<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Contact | MSP Square</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 100px 5%; }
        .card { background: white; max-width: 600px; margin: auto; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #004a99; color: white; border: none; padding: 15px 30px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #004a99;">Ready to Scale?</h2>
        <p>Contact our global delivery team for a free operational audit.</p>
        <form>
            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Work Email">
            <textarea placeholder="Describe your current MSP challenges..." rows="5"></textarea>
            <button type="submit">Send Inquiry</button>
        </form>
        <p style="text-align: center; margin-top: 20px;"><a href="index.html">Back to Home</a></p>
    </div>
</body>
</html>
